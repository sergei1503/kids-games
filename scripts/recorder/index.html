<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הקלטת הברות</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#0f0f2a; color:#fff; font-family:'Heebo','Arial',sans-serif; direction:rtl;
         min-height:100vh; display:flex; flex-direction:column; align-items:center; }

  /* voice picker */
  #picker { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px; padding:24px; text-align:center; }
  #picker h1 { font-size:34px; color:#ffd54a; }
  #picker .voices { display:flex; gap:24px; }
  .voice-btn { font-size:30px; font-weight:800; padding:40px 50px; border-radius:28px; cursor:pointer;
               background:rgba(255,255,255,.06); border:3px solid rgba(255,255,255,.15); color:#fff; }
  .voice-btn .emoji { display:block; font-size:64px; margin-bottom:8px; }
  .voice-btn small { display:block; font-size:16px; color:#8aa0c4; font-weight:400; margin-top:6px; }

  #rec { display:none; flex-direction:column; align-items:center; width:100%; }
  header { width:100%; max-width:760px; padding:16px 20px 6px; }
  .bar { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .who { font-size:18px; font-weight:700; }
  .who a { color:#8aa0c4; font-size:13px; font-weight:400; margin-right:8px; cursor:pointer; text-decoration:underline; }
  .count { font-size:18px; color:#ffd54a; font-weight:700; direction:ltr; unicode-bidi:isolate; }
  .pbar { height:6px; background:rgba(255,255,255,.1); border-radius:6px; margin-top:10px; overflow:hidden; }
  .pbar > div { height:100%; background:#5fd38a; width:0%; transition:width .25s; }
  .ltr-idx { text-align:center; color:#8aa0c4; font-size:14px; margin-top:8px; }

  main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:14px 20px; }
  .glyph { font-size:clamp(110px,28vw,200px); font-weight:800; line-height:1; }
  .vname { font-size:22px; color:#8aa0c4; }
  .sound { font-size:20px; color:#ffd54a; letter-spacing:2px; min-height:24px; }
  .vdots { display:flex; gap:8px; }
  .vdot { width:13px; height:13px; border-radius:50%; background:rgba(255,255,255,.12); }
  .vdot.done { background:#5fd38a; }
  .vdot.cur { outline:2px solid #ffd54a; outline-offset:2px; }
  .mic { width:130px; height:130px; border-radius:50%; border:5px solid #ffd54a; background:rgba(255,255,255,.06);
         color:#ffd54a; font-size:56px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .mic.rec { border-color:#ff5d5d; color:#ff5d5d; animation:pulse 1s infinite; }
  .mic.playing { border-color:#5fd38a; color:#5fd38a; }
  @keyframes pulse { 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.08);} }
  .row { display:flex; gap:12px; align-items:center; }
  button.act { font-size:17px; font-weight:700; padding:11px 20px; border-radius:14px; cursor:pointer;
               background:rgba(255,255,255,.08); color:#fff; border:2px solid rgba(255,255,255,.15); }
  button.act:disabled { opacity:.35; cursor:default; }
  .status { min-height:22px; color:#8aa0c4; font-size:14px; }
  .auto { color:#8aa0c4; font-size:13px; }
  .keys { color:#445; font-size:12px; margin:10px 0 22px; text-align:center; }
</style>
</head>
<body>

  <div id="picker">
    <h1>מי מקליט?</h1>
    <div class="voices" id="voiceBtns"></div>
    <p style="color:#8aa0c4;font-size:14px">כל אחד מקליט את כל ההברות בקול שלו. אפשר להתחלף בכל רגע.</p>
  </div>

  <div id="rec">
    <header>
      <div class="bar">
        <span class="who" id="who"></span>
        <span class="count" id="count"></span>
      </div>
      <div class="pbar"><div id="pfill"></div></div>
      <div class="ltr-idx" id="ltrIdx"></div>
    </header>
    <main>
      <div class="glyph" id="glyph">—</div>
      <div class="vname" id="vname"></div>
      <div class="sound" id="sound"></div>
      <div class="vdots" id="vdots"></div>
      <button class="mic" id="mic">🎙️</button>
      <div class="row">
        <button class="act" id="prev">◀ הקודם</button>
        <button class="act" id="play" disabled>▶ האזנה</button>
        <button class="act" id="next" disabled>הבא ▶</button>
      </div>
      <div class="status" id="status">לחצו על המיקרופון כדי להקליט</div>
      <label class="auto"><input type="checkbox" id="autoAdv" checked> מעבר אוטומטי אחרי הקלטה</label>
    </main>
    <div class="keys">רווח = הקלטה/עצירה · P = האזנה · → / Enter = הבא · ← = הקודם</div>
  </div>

<script>
// Must match hebrew-nikud/data.js
const VOICES = [ {id:'abba',name:'אבא',emoji:'👨'}, {id:'ima',name:'אמא',emoji:'👩'} ];
const LETTERS = [
  {id:'alef',c:'א',mod:'',cons:''},   {id:'bet',c:'ב',mod:'ּ',cons:'b'}, {id:'gimel',c:'ג',mod:'',cons:'g'},
  {id:'dalet',c:'ד',mod:'',cons:'d'}, {id:'he',c:'ה',mod:'',cons:'h'},   {id:'vav',c:'ו',mod:'',cons:'v'},
  {id:'zayin',c:'ז',mod:'',cons:'z'}, {id:'het',c:'ח',mod:'',cons:'ch'}, {id:'tet',c:'ט',mod:'',cons:'t'},
  {id:'yod',c:'י',mod:'',cons:'y'},   {id:'kaf',c:'כ',mod:'ּ',cons:'k'}, {id:'lamed',c:'ל',mod:'',cons:'l'},
  {id:'mem',c:'מ',mod:'',cons:'m'},   {id:'nun',c:'נ',mod:'',cons:'n'},  {id:'samech',c:'ס',mod:'',cons:'s'},
  {id:'ayin',c:'ע',mod:'',cons:''},   {id:'pe',c:'פ',mod:'ּ',cons:'p'},  {id:'tsadi',c:'צ',mod:'',cons:'ts'},
  {id:'qof',c:'ק',mod:'',cons:'k'},   {id:'resh',c:'ר',mod:'',cons:'r'}, {id:'shin',c:'ש',mod:'ׁ',cons:'sh'},
  {id:'tav',c:'ת',mod:'',cons:'t'},
];
const VOWELS = [
  {id:'a',mark:'ַ',name:'פַּתָּח',v:'a'}, {id:'e',mark:'ֶ',name:'סֶגוֹל',v:'e'}, {id:'i',mark:'ִ',name:'חִירִיק',v:'i'},
  {id:'o',mark:'ֹ',name:'חוֹלָם',v:'o'}, {id:'u',mark:'ֻ',name:'קֻבּוּץ',v:'u'},
];
const ITEMS = [];
LETTERS.forEach((l,li) => VOWELS.forEach((vw,vi) => ITEMS.push({
  id: l.id + '_' + vw.id, glyph: l.c + l.mod + vw.mark, vname: vw.name,
  sound: l.cons + vw.v, letterIdx: li, vowelIdx: vi, letterId: l.id,
})));

let voiceId = null, voiceName = '';
let i = 0;
const done = {};
const blobs = {};
let mediaRecorder = null, chunks = [], stream = null, recExt = 'webm';
let advanceToken = 0;

const $ = s => document.querySelector(s);
const micBtn=$('#mic'), playBtn=$('#play'), nextBtn=$('#next'), prevBtn=$('#prev'), autoAdv=$('#autoAdv');

// ---- voice picker ----
VOICES.forEach(v => {
  const b = document.createElement('button');
  b.className = 'voice-btn';
  b.innerHTML = '<span class="emoji">'+v.emoji+'</span>'+v.name;
  b.onclick = () => chooseVoice(v);
  $('#voiceBtns').appendChild(b);
});

async function chooseVoice(v) {
  voiceId = v.id; voiceName = v.name;
  // load already-recorded ids for resume
  try {
    const txt = await (await fetch('/list?voice=' + encodeURIComponent(v.id))).text();
    txt.split('\n').map(s=>s.trim()).filter(Boolean).forEach(id => done[id] = true);
  } catch(e) {}
  // clear in-memory blobs (they belong to a voice session)
  for (const k in blobs) delete blobs[k];
  // jump to first not-yet-recorded item
  const firstTodo = ITEMS.findIndex(it => !done[it.id]);
  i = firstTodo === -1 ? 0 : firstTodo;
  $('#picker').style.display = 'none';
  $('#rec').style.display = 'flex';
  render();
}

function switchVoice() {
  if (mediaRecorder && mediaRecorder.state === 'recording') stopRec();
  advanceToken++;
  // reset done map (will reload for the next voice)
  for (const k in done) delete done[k];
  $('#rec').style.display = 'none';
  $('#picker').style.display = 'flex';
}

function render() {
  const it = ITEMS[i];
  const doneCount = ITEMS.filter(x => done[x.id]).length;
  $('#who').innerHTML = 'מקליט/ה: ' + voiceName + ' <a id="sw">(החלפה)</a>';
  $('#sw').onclick = switchVoice;
  $('#count').textContent = doneCount + ' / ' + ITEMS.length + (doneCount===ITEMS.length ? '  ✓' : '');
  $('#pfill').style.width = (100*doneCount/ITEMS.length) + '%';
  $('#ltrIdx').textContent = 'אות ' + (it.letterIdx+1) + ' / ' + LETTERS.length;
  $('#glyph').textContent = it.glyph;
  $('#vname').textContent = it.vname;
  $('#sound').textContent = it.sound ? 'אמרו: "' + it.sound + '"' : '';
  playBtn.disabled = !blobs[it.id];
  nextBtn.disabled = i >= ITEMS.length - 1;
  prevBtn.disabled = i === 0;
  // 5 vowel dots for the CURRENT letter
  const vd = $('#vdots'); vd.innerHTML = '';
  VOWELS.forEach((vw, vi) => {
    const id = it.letterId + '_' + vw.id;
    const d = document.createElement('div');
    d.className = 'vdot' + (done[id] ? ' done' : '') + (vi===it.vowelIdx ? ' cur' : '');
    vd.appendChild(d);
  });
  $('#status').textContent = done[it.id]
    ? 'הוקלט ✓ — אפשר להאזין, להקליט מחדש, או להמשיך'
    : 'לחצו על המיקרופון כדי להקליט';
}

function gotoIndex(idx){ advanceToken++; if(idx>=0 && idx<ITEMS.length){ i=idx; render(); } }
function gotoNext(){ gotoIndex(i+1); }
function gotoPrev(){ gotoIndex(i-1); }

function pickMime(){
  const cands=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg'];
  for(const c of cands) if(window.MediaRecorder && MediaRecorder.isTypeSupported(c)){
    recExt = c.includes('mp4')?'m4a':(c.includes('ogg')?'ogg':'webm'); return c;
  }
  return '';
}
async function ensureStream(){
  if(stream) return stream;
  stream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
  return stream;
}
async function startRec(){
  advanceToken++;
  await ensureStream();
  chunks=[];
  const mime=pickMime();
  mediaRecorder=new MediaRecorder(stream, mime?{mimeType:mime}:undefined);
  mediaRecorder.ondataavailable=e=>{ if(e.data.size) chunks.push(e.data); };
  mediaRecorder.onstop=onStop;
  mediaRecorder.start();
  micBtn.classList.add('rec'); micBtn.classList.remove('playing'); micBtn.textContent='⏹';
  $('#status').textContent='מקליט… לחצו לעצירה (או רווח)';
}
function stopRec(){
  if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
  micBtn.classList.remove('rec'); micBtn.textContent='🎙️';
}
async function onStop(){
  const it=ITEMS[i]; const recordedIndex=i;
  const blob=new Blob(chunks,{type:chunks[0]?.type||'audio/webm'});
  if(blobs[it.id]) URL.revokeObjectURL(blobs[it.id]);
  blobs[it.id]=URL.createObjectURL(blob);
  try{
    await fetch('/save?name='+encodeURIComponent(it.id)+'&ext='+recExt+'&voice='+encodeURIComponent(voiceId),{method:'POST',body:blob});
    done[it.id]=true; $('#status').textContent='נשמר ✓ — מתנגן לאימות…';
  }catch(e){ $('#status').textContent='נשמר מקומית (השרת לא הגיב — בדקו ש-serve.py רץ)'; }
  render();
  const myToken=++advanceToken;
  playClip(it.id, ()=>{
    if(myToken!==advanceToken) return;
    if(autoAdv.checked && recordedIndex<ITEMS.length-1){ i=recordedIndex+1; render(); }
    else if(ITEMS.every(x=>done[x.id])){ $('#status').textContent='סיימתם! כל '+ITEMS.length+' ההברות הוקלטו ✓ — הריצו convert.sh'; }
  });
}
function playClip(id,onEnded){
  if(!blobs[id]){ if(onEnded) onEnded(); return; }
  const a=new Audio(blobs[id]); micBtn.classList.add('playing');
  let fired=false;
  const fin=()=>{ if(fired) return; fired=true; micBtn.classList.remove('playing'); if(onEnded) onEnded(); };
  a.onended=fin; a.play().then(()=>setTimeout(fin,5000)).catch(()=>setTimeout(fin,400));
}
function playCurrent(){ playClip(ITEMS[i].id); }
function toggleRec(){ if(mediaRecorder && mediaRecorder.state==='recording') stopRec(); else startRec(); }

micBtn.onclick=toggleRec; playBtn.onclick=playCurrent; nextBtn.onclick=gotoNext; prevBtn.onclick=gotoPrev;
document.addEventListener('keydown', e=>{
  if($('#rec').style.display==='none') return;
  if(e.code==='Space'){ e.preventDefault(); toggleRec(); }
  else if(e.key==='p'||e.key==='P') playCurrent();
  else if(e.key==='ArrowRight'||e.key==='Enter') gotoNext();
  else if(e.key==='ArrowLeft') gotoPrev();
});
</script>
</body>
</html>
