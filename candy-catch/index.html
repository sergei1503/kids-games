<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐧 תפסו ממתקים! 🐥</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 900px;
    padding: 10px 20px;
    color: white;
    font-size: 22px;
    direction: ltr;
  }
  .score-box {
    padding: 10px 24px;
    border-radius: 16px;
    font-weight: bold;
    font-size: 30px;
    min-width: 180px;
    text-align: center;
    transition: transform 0.15s;
  }
  .score-p1 { background: linear-gradient(135deg, #4a9eff, #3070cc); color: white; }
  .score-p2 { background: linear-gradient(135deg, #ff6b4a, #cc4030); color: white; }
  .timer { color: #ffd700; font-size: 32px; font-weight: bold; }
  canvas { border-radius: 16px; box-shadow: 0 0 40px rgba(100, 200, 255, 0.2); }
  #instructions { color: #aaa; margin-top: 14px; font-size: 17px; text-align: center; direction: rtl; }
  #startScreen, #endScreen {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10, 10, 30, 0.96);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10; color: white; direction: rtl;
  }
  #startScreen h1, #endScreen h1 { font-size: 48px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
  #startScreen p, #endScreen p { font-size: 22px; margin: 8px; color: #ccc; }
  .key-hint {
    display: inline-block; background: #444; border: 2px solid #666; border-bottom: 4px solid #555;
    border-radius: 8px; padding: 6px 14px; margin: 3px; font-size: 20px; color: #fff; font-family: monospace; font-weight: bold;
  }
  .start-btn {
    margin-top: 25px; padding: 18px 60px; font-size: 32px;
    background: linear-gradient(135deg, #ffd700, #ffaa00); border: none; border-radius: 16px;
    cursor: pointer; color: #333; font-weight: bold; transition: transform 0.1s;
    box-shadow: 0 4px 15px rgba(255, 200, 0, 0.4);
  }
  .start-btn:hover { transform: scale(1.05); }
  .player-info { display: flex; gap: 60px; margin: 20px 0; }
  .player-card { text-align: center; padding: 20px 30px; border-radius: 16px; min-width: 220px; }
  .player-card.p1 { background: rgba(74, 158, 255, 0.15); border: 3px solid #4a9eff; }
  .player-card.p2 { background: rgba(255, 107, 74, 0.15); border: 3px solid #ff6b4a; }
  .player-card .char { font-size: 70px; margin-bottom: 5px; }
  .player-card .name { font-size: 26px; font-weight: bold; margin: 8px 0; }
  .player-card .keys-info { font-size: 18px; margin-top: 10px; line-height: 2; }
  .hidden { display: none !important; }
  #endScreen .winner-text { font-size: 36px; color: #ffd700; margin: 10px; }
  .subtitle { font-size: 20px !important; color: #88bbff !important; }
</style>
</head>
<body>

<div id="startScreen">
  <h1>🍬 תפסו ממתקים! 🍬</h1>
  <p class="subtitle">ממתקים נופלים מהשמיים - אבל מי שאוכל יותר מדי מתנפח!</p>
  <div class="player-info">
    <div class="player-card p1">
      <div class="char">🐧</div>
      <div class="name">פינגווין</div>
      <div class="keys-info">
        <span class="key-hint">A</span> שמאלה
        <span class="key-hint">D</span> ימינה
      </div>
    </div>
    <div class="player-card p2">
      <div class="char">🐥</div>
      <div class="name">אפרוח</div>
      <div class="keys-info">
        <span class="key-hint">←</span> שמאלה
        <span class="key-hint">→</span> ימינה
      </div>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">בואו נשחק!</button>
  <p style="margin-top:15px; font-size:16px; color:#888">או לחצו <span class="key-hint">Space</span></p>
</div>

<div id="endScreen" class="hidden">
  <h1 id="endTitle"></h1>
  <div class="winner-text" id="winnerText"></div>
  <div class="player-info">
    <div class="player-card p1">
      <div class="char">🐧</div>
      <div class="name">פינגווין</div>
      <div id="finalScore1" style="font-size:36px; color:#ffd700;"></div>
    </div>
    <div class="player-card p2">
      <div class="char">🐥</div>
      <div class="name">אפרוח</div>
      <div id="finalScore2" style="font-size:36px; color:#ffd700;"></div>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">שחקו שוב!</button>
</div>

<div id="header" class="hidden">
  <div class="score-box score-p1" id="scoreBox1">🐧 <span id="score1">0</span></div>
  <div class="timer">⏱ <span id="timer">45</span></div>
  <div class="score-box score-p2" id="scoreBox2">🐥 <span id="score2">0</span></div>
</div>
<canvas id="game" width="900" height="550" class="hidden"></canvas>
<div id="instructions" class="hidden">
  🐧 A / D &nbsp;&nbsp;|&nbsp;&nbsp; 🐥 ← / → &nbsp;&nbsp;|&nbsp;&nbsp; תפסו ממתקים! 🌶️ = רזה! &nbsp;&nbsp;|&nbsp;&nbsp; אכלתם יותר מדי? נופלים! 🫃
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 900, H = 550;

// ============ AUDIO ============
let audioCtx;
function initAudio() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playSound(freq, dur, type = 'square', vol = 0.12) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq; g.gain.value = vol;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
}
function playCollect() { playSound(660, 0.08); setTimeout(() => playSound(880, 0.12), 60); setTimeout(() => playSound(1100, 0.1), 120); }
function playBonusCollect() { playSound(523, 0.1, 'sine', 0.15); setTimeout(() => playSound(784, 0.1, 'sine', 0.15), 80); setTimeout(() => playSound(1047, 0.15, 'sine', 0.15), 160); }
function playBad() { playSound(200, 0.2, 'sawtooth', 0.1); setTimeout(() => playSound(150, 0.25, 'sawtooth', 0.1), 100); }
function playFall() {
  for (let i = 0; i < 8; i++) setTimeout(() => playSound(600 - i * 60, 0.06, 'sine', 0.1), i * 40);
  setTimeout(() => playSound(80, 0.3, 'triangle', 0.2), 320);
}
function playBurp() { playSound(120, 0.15, 'sawtooth', 0.08); setTimeout(() => playSound(90, 0.2, 'sawtooth', 0.06), 100); }
function playEnd() { [0, 150, 300, 450, 600].forEach((d, i) => { setTimeout(() => playSound([523, 659, 784, 1047, 1319][i], 0.3, 'sine', 0.12), d); }); }

// ============ FALLING ITEMS ============
const CANDY_TYPES = [
  { emoji: '🍬', points: 1, color: '#ff69b4', size: 32 },
  { emoji: '🍭', points: 1, color: '#ff44aa', size: 34 },
  { emoji: '🧁', points: 1, color: '#ff88cc', size: 32 },
  { emoji: '🍩', points: 1, color: '#dd8844', size: 32 },
  { emoji: '🍪', points: 1, color: '#cc9944', size: 30 },
  { emoji: '🎂', points: 2, color: '#ff6699', size: 36 },
  { emoji: '🍰', points: 2, color: '#ffaacc', size: 34 },
  { emoji: '⭐', points: 3, color: '#ffd700', size: 36 },
  { emoji: '🌈', points: 3, color: '#ff88ff', size: 38 },
];
const BAD_ITEM = { emoji: '🌶️', points: -2, color: '#ff2200', size: 34 };

class FallingItem {
  constructor() { this.reset(); }
  reset() {
    const r = Math.random();
    if (r < 0.12) this.type = BAD_ITEM;
    else if (r < 0.22) this.type = CANDY_TYPES[7 + Math.floor(Math.random() * 2)];
    else if (r < 0.35) this.type = CANDY_TYPES[5 + Math.floor(Math.random() * 2)];
    else this.type = CANDY_TYPES[Math.floor(Math.random() * 5)];
    this.x = 40 + Math.random() * (W - 80);
    this.y = -30 - Math.random() * 60;
    this.speed = 1.2 + Math.random() * 1.0;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.02 + Math.random() * 0.02;
    this.rotation = 0;
    this.rotSpeed = (Math.random() - 0.5) * 0.03;
    this.active = true;
  }
  update() {
    if (!this.active) return;
    this.y += this.speed;
    this.wobble += this.wobbleSpeed;
    this.x += Math.sin(this.wobble) * 0.5;
    this.rotation += this.rotSpeed;
    if (this.y > H + 30) this.reset();
  }
  draw() {
    if (!this.active) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    if (this.type.points >= 2) {
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 25);
      glow.addColorStop(0, this.type.color + '44'); glow.addColorStop(1, this.type.color + '00');
      ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI * 2); ctx.fill();
    }
    if (this.type.points < 0) {
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 22);
      glow.addColorStop(0, 'rgba(255,0,0,0.2)'); glow.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.fill();
    }
    ctx.font = `${this.type.size}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(this.type.emoji, 0, 0);
    if (this.type.points >= 3) {
      ctx.font = 'bold 14px Arial'; ctx.fillStyle = '#ffd700'; ctx.strokeStyle = '#885500'; ctx.lineWidth = 2;
      ctx.strokeText(`+${this.type.points}`, 0, -22); ctx.fillText(`+${this.type.points}`, 0, -22);
    }
    ctx.restore();
  }
}

// ============ EFFECTS ============
const floatingTexts = [];
function addFloatingText(x, y, text, color) { floatingTexts.push({ x, y, text, color, life: 40, vy: -2 }); }
const particles = [];
function addParticles(x, y, color, count = 6) {
  for (let i = 0; i < count; i++) {
    const a = (Math.PI * 2 / count) * i;
    particles.push({ x, y, vx: Math.cos(a) * (2 + Math.random() * 2), vy: Math.sin(a) * (2 + Math.random() * 2), life: 25, color, size: 3 + Math.random() * 3 });
  }
}

// ============ PLAYER ============
class Player {
  constructor(startX, color, emoji, name, keyLeft, keyRight) {
    this.startX = startX; this.x = startX;
    this.w = 60; this.h = 60;
    this.color = color; this.emoji = emoji; this.name = name;
    this.keyLeft = keyLeft; this.keyRight = keyRight;
    this.score = 0; this.candiesEaten = 0;
    this.vx = 0; this.facing = 1;
    this.walkFrame = 0; this.walkTimer = 0;
    this.collectAnim = 0; this.hurtAnim = 0;
    this.y = H - 100;
    // Fatness
    this.fatness = 0;
    this.wobbleAngle = 0; this.wobbleVel = 0;
    // Fall
    this.fallen = false; this.fallAngle = 0; this.fallTimer = 0; this.fallDir = 0;
    // Effects
    this.sweats = []; this.sweatTimer = 0; this.burpTimer = 0;
  }

  getFat() { return Math.min(this.fatness / 18, 1.0); }
  getWidthScale() { return 1 + this.getFat() * 1.3; }
  getSpeedMult() { return Math.max(0.25, 1 - this.getFat() * 0.7); }

  reset() {
    this.x = this.startX; this.vx = 0; this.score = 0; this.candiesEaten = 0;
    this.fatness = 0; this.collectAnim = 0; this.hurtAnim = 0;
    this.wobbleAngle = 0; this.wobbleVel = 0;
    this.fallen = false; this.fallAngle = 0; this.fallTimer = 0;
    this.sweats = []; this.burpTimer = 0;
  }

  eatCandy(points) {
    if (points > 0) {
      this.candiesEaten += points;
      this.fatness += points * 0.9;
      this.wobbleVel += (Math.random() - 0.5) * 0.05 * (1 + this.getFat());
      if (this.fatness > 7 && Math.random() < 0.3) { this.burpTimer = 30; playBurp(); }
      if (this.fatness >= 10 && !this.fallen) {
        const chance = (this.fatness - 10) * 0.05;
        if (Math.random() < chance) this.triggerFall();
      }
    } else {
      this.fatness = Math.max(0, this.fatness - 3);
    }
  }

  triggerFall() {
    this.fallen = true;
    this.fallDir = this.vx >= 0 ? 1 : -1;
    if (this.fallDir === 0) this.fallDir = Math.random() < 0.5 ? -1 : 1;
    this.fallAngle = 0;
    this.fallTimer = 80 + Math.floor(this.getFat() * 50);
    this.vx = 0;
    playFall();
    this.fatness = Math.max(0, this.fatness - 4);
    addFloatingText(this.x + this.w / 2, this.y - 20, '🤯 בום!', '#ff8800');
  }

  update(keysDown) {
    const speed = 5.5 * this.getSpeedMult();

    if (this.fallen) {
      this.fallTimer--;
      const target = this.fallDir * Math.PI / 2;
      if (Math.abs(this.fallAngle) < Math.abs(target) - 0.05) this.fallAngle += this.fallDir * 0.08;
      if (this.fallTimer <= 25) this.fallAngle *= 0.87;
      if (this.fallTimer <= 0) { this.fallen = false; this.fallAngle = 0; this.wobbleVel = 0; }
      this.vx *= 0.8;
      return;
    }

    if (keysDown[this.keyLeft]) { this.vx -= speed * 0.35; this.facing = -1; }
    if (keysDown[this.keyRight]) { this.vx += speed * 0.35; this.facing = 1; }
    this.vx *= 0.85;
    this.x += this.vx;

    // Wobble physics
    if (this.getFat() > 0.15) {
      this.wobbleVel += this.vx * 0.003 * this.getFat();
      this.wobbleVel -= this.wobbleAngle * 0.08;
      this.wobbleVel *= 0.92;
      this.wobbleAngle += this.wobbleVel;
      const max = 0.3 + this.getFat() * 0.2;
      this.wobbleAngle = Math.max(-max, Math.min(max, this.wobbleAngle));
      if (Math.abs(this.wobbleAngle) > 0.4 && this.fatness >= 13) this.triggerFall();
    } else {
      this.wobbleAngle *= 0.9;
    }

    // Walk anim
    const ws = Math.max(4, 8 + this.getFat() * 6);
    if (Math.abs(this.vx) > 0.5) {
      this.walkTimer++;
      if (this.walkTimer > ws) { this.walkFrame = (this.walkFrame + 1) % 4; this.walkTimer = 0; }
    } else { this.walkFrame = 0; this.walkTimer = 0; }

    if (this.collectAnim > 0) this.collectAnim--;
    if (this.hurtAnim > 0) this.hurtAnim--;
    if (this.burpTimer > 0) this.burpTimer--;

    // Sweat
    this.sweatTimer++;
    if (this.getFat() > 0.4 && this.sweatTimer % Math.max(5, 20 - Math.floor(this.getFat() * 14)) === 0) {
      this.sweats.push({ x: (Math.random() - 0.5) * 20, y: -25, vy: -1 - Math.random(), life: 25 });
    }
    this.sweats = this.sweats.filter(s => { s.y += s.vy; s.life--; return s.life > 0; });

    // Digest slowly
    if (this.fatness > 0 && frameCount % 90 === 0) this.fatness = Math.max(0, this.fatness - 0.3);

    // Walls
    if (this.x < 5) { this.x = 5; this.vx = 0; }
    if (this.x + this.w > W - 5) { this.x = W - this.w - 5; this.vx = 0; }
  }

  draw() {
    ctx.save();
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    const fat = this.getFat();
    const fatW = this.getWidthScale();

    let sy = 1, sx = 1;
    if (this.collectAnim > 0) {
      sy = 1 + Math.sin(this.collectAnim * 0.4) * 0.2;
      sx = 1 - Math.sin(this.collectAnim * 0.4) * 0.1;
    }

    let shakeX = 0;
    if (this.hurtAnim > 0) { shakeX = Math.sin(this.hurtAnim * 2) * 4; if (this.hurtAnim % 3 === 0) ctx.globalAlpha = 0.6; }

    const bob = Math.sin(this.walkFrame * Math.PI / 2) * (3 + fat * 4);
    ctx.translate(cx + shakeX, cy + bob);

    // Fall rotation from feet
    if (this.fallen) {
      ctx.translate(0, this.h / 2 - 10);
      ctx.rotate(this.fallAngle);
      ctx.translate(0, -(this.h / 2 - 10));
    }

    ctx.rotate(this.wobbleAngle);
    ctx.scale(this.facing * sx * fatW, sy * (1 - fat * 0.12));

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(0, this.h / 2 - 5, 26 * Math.max(1, fatW * 0.6), 7, 0, 0, Math.PI * 2);
    ctx.fill();

    if (this.emoji === '🐧') this.drawPenguin(fat);
    else this.drawChick(fat);

    // Sweat drops
    this.sweats.forEach(s => {
      ctx.fillStyle = `rgba(100, 180, 255, ${s.life / 25})`;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.quadraticCurveTo(s.x - 3, s.y + 4, s.x, s.y + 7);
      ctx.quadraticCurveTo(s.x + 3, s.y + 4, s.x, s.y);
      ctx.fill();
    });

    // Burp cloud
    if (this.burpTimer > 0) {
      ctx.font = `${14 + (30 - this.burpTimer)}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('💨', 15 + (30 - this.burpTimer) * 0.5, -30 - (30 - this.burpTimer) * 0.8);
    }

    ctx.restore();

    // Stars when fallen
    if (this.fallen && this.fallTimer > 25) {
      ctx.save();
      ctx.translate(cx, cy - 50);
      ctx.font = '18px Arial'; ctx.textAlign = 'center';
      const t = frameCount * 0.1;
      for (let i = 0; i < 3; i++) {
        const a = t + i * Math.PI * 2 / 3;
        ctx.fillText('💫', Math.cos(a) * 20, Math.sin(a) * 8 - 5);
      }
      ctx.restore();
    }
  }

  drawPenguin(fat) {
    const s = 1.35;

    // Body
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.ellipse(0, 4 * s, 17 * s, 20 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Belly - stretches and pinkens
    ctx.fillStyle = fat > 0.5 ? '#ffe8e8' : '#f0f0ff';
    ctx.beginPath();
    ctx.ellipse(0, 7 * s, (11 + fat * 5) * s, (14 + fat * 3) * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Belly button when fat
    if (fat > 0.35) {
      ctx.fillStyle = `rgba(150,140,160,${fat * 0.5})`;
      ctx.beginPath();
      ctx.ellipse(0, 12 * s, 2 * s, 3 * s, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Head (slightly puffier)
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.arc(0, -14 * s, (14 + fat * 2) * s, 0, Math.PI * 2);
    ctx.fill();

    // Double chin
    if (fat > 0.4) {
      ctx.fillStyle = '#2a2a3e';
      ctx.beginPath();
      ctx.ellipse(0, (-5 + fat * 3) * s, (8 + fat * 4) * s, (3 + fat * 3) * s, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Cheeks - redder when fat
    const cr = 0.3 + fat * 0.5;
    ctx.fillStyle = `rgba(255,100,100,${cr})`;
    ctx.beginPath();
    ctx.ellipse(8 * s, -10 * s, (5 + fat * 3) * s, (4 + fat * 2) * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(-8 * s, -10 * s, (4 + fat * 2) * s, (3 + fat * 2) * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes - squintier when fat
    const sq = fat * 0.35;
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.ellipse(5 * s, -16 * s, 6 * s, (7 - sq * 7) * s, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(6 * s, -15 * s, (3.5 - sq * 2) * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(7.5 * s, -16.5 * s, 1.5 * s, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.ellipse(-5 * s, -16 * s, 5 * s, (6 - sq * 6) * s, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(-4 * s, -15 * s, (3 - sq * 1.5) * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(-2.5 * s, -16.5 * s, 1.2 * s, 0, Math.PI * 2); ctx.fill();

    // Beak
    ctx.fillStyle = '#ff8c00';
    ctx.beginPath(); ctx.moveTo(8 * s, -11 * s); ctx.lineTo(15 * s, -9 * s); ctx.lineTo(8 * s, -7 * s); ctx.closePath(); ctx.fill();

    // Mouth
    ctx.strokeStyle = '#ff8c00'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (fat < 0.5) ctx.arc(3 * s, -8 * s, 4 * s, 0.2, Math.PI - 0.2);
    else ctx.arc(3 * s, -6 * s, 3 * s, Math.PI + 0.3, -0.3);
    ctx.stroke();

    // Tongue when very fat
    if (fat > 0.6) {
      ctx.fillStyle = '#ff6688';
      ctx.beginPath();
      ctx.ellipse(5 * s, -4 * s, 2.5 * s, (1.5 + Math.sin(frameCount * 0.1) * 0.5) * s, 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Feet
    ctx.fillStyle = '#ff8c00';
    const fa = Math.max(1, 4 - fat * 3);
    const fw = Math.sin(this.walkFrame * Math.PI / 2) * fa;
    ctx.beginPath(); ctx.ellipse(-7 * s + fw, 23 * s, 8 * s, 5 * s, -0.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7 * s - fw, 23 * s, 8 * s, 5 * s, 0.2, 0, Math.PI * 2); ctx.fill();

    // Wings - stick out more when fat
    ctx.fillStyle = '#2a2a4e';
    const wo = 0.3 + fat * 0.6;
    const wa = Math.sin(this.walkFrame * Math.PI / 2) * 0.2;
    ctx.save(); ctx.translate(-17 * s, -1 * s); ctx.rotate(-wo + wa);
    ctx.beginPath(); ctx.ellipse(0, 0, 5 * s, 14 * s, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    ctx.save(); ctx.translate(17 * s, -1 * s); ctx.rotate(wo - wa);
    ctx.beginPath(); ctx.ellipse(0, 0, 5 * s, 14 * s, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();

    // Ring
    ctx.strokeStyle = '#4a9eff'; ctx.lineWidth = 2.5; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.ellipse(0, 5 * s, 22 * s, 26 * s, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
  }

  drawChick(fat) {
    const s = 1.35;

    // Body
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.ellipse(0, 5 * s, 16 * s, 18 * s, 0, 0, Math.PI * 2); ctx.fill();

    // Belly - stretches
    ctx.fillStyle = fat > 0.5 ? '#ffdd66' : '#ffec80';
    ctx.beginPath(); ctx.ellipse(0, 9 * s, (11 + fat * 5) * s, (12 + fat * 3) * s, 0, 0, Math.PI * 2); ctx.fill();

    // Belly button
    if (fat > 0.35) {
      ctx.fillStyle = `rgba(200,160,50,${fat * 0.5})`;
      ctx.beginPath(); ctx.ellipse(0, 14 * s, 2 * s, 3 * s, 0, 0, Math.PI * 2); ctx.fill();
    }

    // Head (puffier)
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(0, -12 * s, (14 + fat * 2) * s, 0, Math.PI * 2); ctx.fill();

    // Double chin
    if (fat > 0.4) {
      ctx.fillStyle = '#e6b800';
      ctx.beginPath(); ctx.ellipse(0, (-3 + fat * 3) * s, (8 + fat * 4) * s, (3 + fat * 3) * s, 0, 0, Math.PI * 2); ctx.fill();
    }

    // Fluffy top
    ctx.fillStyle = '#ffe44d';
    for (const [dx, dy, r] of [[-4, -25, 6], [4, -24, 5], [0, -27, 5]]) {
      ctx.beginPath(); ctx.arc(dx * s, dy * s, r * s, 0, Math.PI * 2); ctx.fill();
    }

    // Cheeks
    const cr = 0.35 + fat * 0.5;
    ctx.fillStyle = `rgba(255,130,100,${cr})`;
    ctx.beginPath(); ctx.ellipse(9 * s, -8 * s, (5 + fat * 3) * s, (4 + fat * 2) * s, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-9 * s, -8 * s, (4 + fat * 2) * s, (3 + fat * 2) * s, 0, 0, Math.PI * 2); ctx.fill();

    // Eyes - squintier
    const sq = fat * 0.35;
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.ellipse(5 * s, -14 * s, 4.5 * s, (5 - sq * 4) * s, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(6.5 * s, -15.5 * s, 2 * s, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.ellipse(-5 * s, -14 * s, 4 * s, (4.5 - sq * 3.5) * s, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(-3.5 * s, -15.5 * s, 1.5 * s, 0, Math.PI * 2); ctx.fill();

    // Beak
    ctx.fillStyle = '#ff6b35';
    ctx.beginPath(); ctx.moveTo(10 * s, -9 * s); ctx.lineTo(17 * s, -7 * s); ctx.lineTo(10 * s, -5 * s); ctx.closePath(); ctx.fill();

    // Mouth
    ctx.strokeStyle = '#ee5500'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (fat < 0.5) ctx.arc(3 * s, -6 * s, 4 * s, 0.2, Math.PI - 0.2);
    else ctx.arc(3 * s, -4 * s, 3 * s, Math.PI + 0.3, -0.3);
    ctx.stroke();

    // Tongue when very fat
    if (fat > 0.6) {
      ctx.fillStyle = '#ff6688';
      ctx.beginPath();
      ctx.ellipse(5 * s, -2 * s, 2.5 * s, (1.5 + Math.sin(frameCount * 0.1) * 0.5) * s, 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Wings - stick out more
    ctx.fillStyle = '#e6c200';
    const wo = 0.4 + fat * 0.6;
    const wa = Math.sin(this.walkFrame * Math.PI / 2) * 0.25;
    ctx.save(); ctx.translate(-15 * s, 0); ctx.rotate(-wo + wa);
    ctx.beginPath(); ctx.ellipse(0, 0, 5 * s, 12 * s, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    ctx.save(); ctx.translate(15 * s, 0); ctx.rotate(wo - wa);
    ctx.beginPath(); ctx.ellipse(0, 0, 5 * s, 12 * s, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();

    // Feet
    ctx.fillStyle = '#ff6b35';
    const fa = Math.max(1, 4 - fat * 3);
    const fw = Math.sin(this.walkFrame * Math.PI / 2) * fa;
    ctx.beginPath(); ctx.ellipse(-6 * s + fw, 22 * s, 7 * s, 4 * s, -0.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6 * s - fw, 22 * s, 7 * s, 4 * s, 0.2, 0, Math.PI * 2); ctx.fill();

    // Ring
    ctx.strokeStyle = '#ff6b4a'; ctx.lineWidth = 2.5; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.ellipse(0, 5 * s, 22 * s, 26 * s, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ============ GAME STATE ============
let player1, player2, items = [], keysDown = {};
let gameTime = 45, gameTimer, gameRunning = false, frameCount = 0;

const bgStars = [];
for (let i = 0; i < 60; i++) bgStars.push({ x: Math.random() * W, y: Math.random() * H * 0.7, size: Math.random() * 2 + 0.5, twinkle: Math.random() * Math.PI * 2, speed: Math.random() * 0.02 + 0.01 });

// ============ GAME FUNCTIONS ============
function startGame() {
  if (!audioCtx) initAudio();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('header').classList.remove('hidden');
  canvas.classList.remove('hidden');
  document.getElementById('instructions').classList.remove('hidden');

  player1 = new Player(150, '#4a9eff', '🐧', 'פינגווין', 'KeyA', 'KeyD');
  player2 = new Player(650, '#ff6b4a', '🐥', 'אפרוח', 'ArrowLeft', 'ArrowRight');

  items = [];
  for (let i = 0; i < 6; i++) { const it = new FallingItem(); it.y = -30 - i * 80; items.push(it); }
  particles.length = 0; floatingTexts.length = 0;

  gameTime = 45; frameCount = 0;
  document.getElementById('timer').textContent = gameTime;
  document.getElementById('timer').style.color = '#ffd700';
  document.getElementById('score1').textContent = '0';
  document.getElementById('score2').textContent = '0';
  gameRunning = true;

  if (gameTimer) clearInterval(gameTimer);
  gameTimer = setInterval(() => {
    gameTime--;
    document.getElementById('timer').textContent = gameTime;
    if (gameTime <= 0) endGame();
    if (gameTime <= 10) { document.getElementById('timer').style.color = '#ff4444'; playSound(250, 0.04, 'sine', 0.04); }
  }, 1000);
  requestAnimationFrame(gameLoop);
}

function endGame() {
  gameRunning = false; clearInterval(gameTimer); playEnd();
  document.getElementById('header').classList.add('hidden');
  canvas.classList.add('hidden');
  document.getElementById('instructions').classList.add('hidden');
  document.getElementById('endScreen').classList.remove('hidden');
  document.getElementById('finalScore1').textContent = `🍬 ${player1.score}`;
  document.getElementById('finalScore2').textContent = `🍬 ${player2.score}`;
  if (player1.score > player2.score) {
    document.getElementById('endTitle').textContent = '🐧 הפינגווין ניצח! 🎉';
    document.getElementById('winnerText').textContent = `${player1.score} נגד ${player2.score}`;
  } else if (player2.score > player1.score) {
    document.getElementById('endTitle').textContent = '🐥 האפרוח ניצח! 🎉';
    document.getElementById('winnerText').textContent = `${player2.score} נגד ${player1.score}`;
  } else {
    document.getElementById('endTitle').textContent = '🤝 תיקו!';
    document.getElementById('winnerText').textContent = `${player1.score} - ${player2.score}`;
  }
}

document.addEventListener('keydown', e => {
  keysDown[e.code] = true;
  if (e.code === 'Space' && !gameRunning) startGame();
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keysDown[e.code] = false; });

// ============ MAIN LOOP ============
function gameLoop() {
  if (!gameRunning) return;
  frameCount++;

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0c0e2a'); bgGrad.addColorStop(0.4, '#1a2555');
  bgGrad.addColorStop(0.85, '#2a4070'); bgGrad.addColorStop(1, '#3a5530');
  ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);

  bgStars.forEach(s => {
    s.twinkle += s.speed;
    ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(s.twinkle) * 0.3})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
  });

  // Ground
  const groundY = H - 65;
  const gGrad = ctx.createLinearGradient(0, groundY, 0, H);
  gGrad.addColorStop(0, '#4a8c3f'); gGrad.addColorStop(0.3, '#3d7a35'); gGrad.addColorStop(1, '#2d5a28');
  ctx.fillStyle = gGrad; ctx.fillRect(0, groundY, W, H - groundY);

  ctx.fillStyle = '#5aa04a';
  for (let i = 0; i < W; i += 12) {
    const h = 8 + Math.sin(i * 0.3 + frameCount * 0.03) * 3;
    ctx.beginPath(); ctx.moveTo(i, groundY); ctx.lineTo(i + 4, groundY - h); ctx.lineTo(i + 8, groundY); ctx.fill();
  }

  const fc = ['#ff6699', '#ffaa44', '#ff44aa', '#44aaff', '#ffff44'];
  for (let i = 0; i < 12; i++) {
    const fx = (i * 79 + 30) % W, fy = groundY + 12 + (i % 3) * 8;
    ctx.fillStyle = fc[i % 5]; ctx.beginPath(); ctx.arc(fx, fy, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffee44'; ctx.beginPath(); ctx.arc(fx, fy, 2, 0, Math.PI * 2); ctx.fill();
  }

  // Items
  items.forEach(it => { it.update(); it.draw(); });

  // Players
  player1.update(keysDown);
  player2.update(keysDown);

  // Catching items
  items.forEach(item => {
    if (!item.active) return;
    [player1, player2].forEach(p => {
      if (p.fallen) return;
      const px = p.x + p.w / 2, py = p.y + p.h / 2;
      const dx = px - item.x, dy = py - item.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const catchR = 42 + p.getFat() * 15;

      if (dist < catchR) {
        p.score += item.type.points;
        if (p.score < 0) p.score = 0;
        p.eatCandy(item.type.points);
        const id = p === player1 ? '1' : '2';
        document.getElementById('score' + id).textContent = p.score;

        if (item.type.points > 0) {
          p.collectAnim = 15;
          if (item.type.points >= 3) { playBonusCollect(); addParticles(item.x, item.y, '#ffd700', 10); addFloatingText(item.x, item.y, `+${item.type.points}!`, '#ffd700'); }
          else if (item.type.points >= 2) { playBonusCollect(); addParticles(item.x, item.y, item.type.color, 8); addFloatingText(item.x, item.y, `+${item.type.points}`, '#ffaa00'); }
          else { playCollect(); addParticles(item.x, item.y, item.type.color, 5); addFloatingText(item.x, item.y, '+1', '#fff'); }
          const box = document.getElementById('scoreBox' + id);
          box.style.transform = 'scale(1.15)'; setTimeout(() => box.style.transform = 'scale(1)', 150);
        } else {
          p.hurtAnim = 20; playBad();
          addParticles(item.x, item.y, '#ff0000', 8);
          addFloatingText(item.x, item.y, `${item.type.points}`, '#ff4444');
          if (p.fatness > 2) setTimeout(() => addFloatingText(p.x + p.w / 2, p.y - 10, '🏃 רזה!', '#44ff44'), 200);
          const box = document.getElementById('scoreBox' + id);
          box.style.transform = 'scale(0.85)'; setTimeout(() => box.style.transform = 'scale(1)', 200);
        }
        item.reset(); item.y = -30 - Math.random() * 60;
      }
    });
  });

  // Player bumping
  const bDx = (player1.x + player1.w / 2) - (player2.x + player2.w / 2);
  const bDist = Math.abs(bDx);
  const bRange = 50 + (player1.getFat() + player2.getFat()) * 15;
  if (bDist < bRange) {
    const push = bDx > 0 ? 3 : -3;
    const w1 = 1 + player1.getFat() * 2, w2 = 1 + player2.getFat() * 2;
    player1.vx += push * 0.4 * (w2 / w1);
    player2.vx -= push * 0.4 * (w1 / w2);
    player1.wobbleVel += 0.02 * w2;
    player2.wobbleVel -= 0.02 * w1;
  }

  // Draw players
  player1.draw();
  player2.draw();

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life / 25; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (p.life / 25), 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy; ft.life--;
    if (ft.life <= 0) { floatingTexts.splice(i, 1); continue; }
    ctx.globalAlpha = ft.life / 40;
    ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 3; ctx.fillStyle = ft.color;
    ctx.strokeText(ft.text, ft.x, ft.y); ctx.fillText(ft.text, ft.x, ft.y);
    ctx.globalAlpha = 1;
  }

  // More items over time
  if (frameCount === 300 && items.length < 8) items.push(new FallingItem());
  if (frameCount === 600 && items.length < 9) items.push(new FallingItem());
  if (frameCount === 900 && items.length < 10) items.push(new FallingItem());

  if (gameTime <= 10) {
    ctx.fillStyle = `rgba(255,0,0,${Math.sin(Date.now() * 0.008) * 0.04})`;
    ctx.fillRect(0, 0, W, H);
  }

  requestAnimationFrame(gameLoop);
}
